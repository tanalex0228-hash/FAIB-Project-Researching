name: Model experiment
description: Track a VAR, time series, or ML experiment.
title: "[Experiment] "
labels: ["experiment"]
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What question does this experiment answer?
    validations:
      required: true
  - type: textarea
    id: data
    attributes:
      label: Data
      description: Series IDs, date range, frequency, and preprocessing.
    validations:
      required: true
  - type: textarea
    id: model
    attributes:
      label: Model
      description: VAR/ML model, lags, features, hyperparameters, and assumptions.
  - type: textarea
    id: metrics
    attributes:
      label: Metrics
      description: Evaluation metrics and expected outputs.
